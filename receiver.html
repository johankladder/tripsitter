<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tripsitter - Cast Receiver</title>
<link rel="stylesheet" href="style.css">
<style>
  cast-media-player { display: none !important; }
  body { background: #050510; }
</style>
<script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
</head>
<body class="cast-receiver">

<canvas id="main"></canvas>
<div class="grain"></div>
<div class="vignette"></div>

<!-- Status indicator (shows briefly when scene/mood changes) -->
<div class="cast-status" id="castStatus"></div>

<!-- Scene indicator bar (top) -->
<div class="scene-bar" id="sceneBar"></div>

<!-- Mood indicator bar (bottom) -->
<div class="mood-bar" id="moodBar"></div>

<!-- Splash screen (inlined for Chromecast reliability) -->
<div class="title-overlay" id="titleOverlay">
  <h1>tripsitter</h1>
  <div class="mode-select" id="modeSelect">
    <button class="mode-btn active" data-mode="ambient">ambient</button>
    <span class="mode-divider">&middot;</span>
    <button class="mode-btn" data-mode="interactive">interactive</button>
    <span class="mode-divider">&middot;</span>
    <button class="mode-btn" data-mode="garden">garden</button>
  </div>
  <p class="mode-hint">select a mode to begin</p>
  <button class="splash-cast-btn" id="splashCastBtn" title="Cast to TV" style="display:none;">
    <svg viewBox="0 0 24 24"><path d="M1 18v3h3c0-1.66-1.34-3-3-3zm0-4v2c2.76 0 5 2.24 5 5h2c0-3.87-3.13-7-7-7zm0-4v2c4.97 0 9 4.03 9 9h2c0-6.08-4.93-11-11-11zm20-7H3c-1.1 0-2 .9-2 2v3h2V5h18v14h-7v2h7c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg>
    <span>cast to tv</span>
  </button>
  <span class="credit">by Johan Kladder</span>
</div>

<script>
// Override resize before app.js loads to handle Chromecast quirks
window._castReceiver = true;
</script>
<script src="app.js"></script>
<script src="scenes/deep.js"></script>
<script src="scenes/mandala.js"></script>
<script src="scenes/cosmos.js"></script>
<script src="scenes/liquid.js"></script>
<script src="scenes/waves.js"></script>
<script src="scenes/kaleido.js"></script>
<script src="scenes/fireflies.js"></script>
<script src="scenes/spiral.js"></script>
<script src="scenes/rain.js"></script>
<script src="scenes/ink.js"></script>
<script src="scenes/mycelium.js"></script>
<script src="scenes/threads.js"></script>
<script src="modes/constellation.js"></script>
<script src="modes/symbiosis.js"></script>
<script src="modes/garden.js"></script>
<script src="boot.js"></script>
<script>
// ══════════════════════════════════════════════════════
// CHROMECAST RECEIVER
// ══════════════════════════════════════════════════════

// Dismiss splash — delegates to startWithMode from app.js
function dismissSplash() {
  if (started) return;
  startWithMode(appMode || 'ambient');
}

// Force re-init canvas in case sizing was off
resize();
initCurrentScene();

// Scene and mood lists for cycling with remote
const sceneNames = ['deep', 'mandala', 'cosmos', 'liquid', 'waves', 'kaleido', 'fireflies', 'spiral', 'rain', 'ink', 'mycelium', 'threads'];
const moodNames = ['ocean', 'aurora', 'ember', 'dream', 'forest', 'sunset', 'ice', 'neon', 'midnight', 'rose'];
let sceneIndex = 0;
let moodIndex = 0;

// Show status briefly
function showStatus(text) {
  const el = document.getElementById('castStatus');
  el.textContent = text;
  el.classList.add('visible');
  clearTimeout(el._timeout);
  el._timeout = setTimeout(() => el.classList.remove('visible'), 2000);
}

// Send state changes back to the sender
function notifySender(data) {
  try {
    const ctx = cast.framework.CastReceiverContext.getInstance();
    const senders = ctx.getSenders();
    for (let i = 0; i < senders.length; i++) {
      ctx.sendCustomMessage(CHANNEL, senders[i].id, data);
    }
  } catch (e) {}
}

function setScene(index, fromSender) {
  sceneIndex = ((index % sceneNames.length) + sceneNames.length) % sceneNames.length;
  switchScene(sceneNames[sceneIndex]);
  showSceneBar();
  if (!fromSender) notifySender({ scene: sceneNames[sceneIndex] });
}

function setMood(index, fromSender) {
  moodIndex = ((index % moodNames.length) + moodNames.length) % moodNames.length;
  const name = moodNames[moodIndex];
  targetMood = MOODS[name];
  showMoodBar();
  if (!fromSender) notifySender({ mood: name });
}

// Scene icons (matching sender UI)
const SCENE_ICONS = {
  deep: '<circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="4" opacity="0.5"/>',
  mandala: '<circle cx="12" cy="12" r="9"/><line x1="12" y1="3" x2="12" y2="21"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="5.6" y1="5.6" x2="18.4" y2="18.4"/><line x1="18.4" y1="5.6" x2="5.6" y2="18.4"/>',
  cosmos: '<circle cx="12" cy="6" r="1.5" fill="currentColor" stroke="none"/><circle cx="6" cy="16" r="1" fill="currentColor" stroke="none"/><circle cx="18" cy="14" r="1.2" fill="currentColor" stroke="none"/><circle cx="14" cy="20" r="0.8" fill="currentColor" stroke="none"/><circle cx="8" cy="10" r="0.6" fill="currentColor" stroke="none"/><path d="M4 3l2 2M18 5l1.5 1.5" opacity="0.5"/>',
  liquid: '<path d="M12 3c-4 6-7 9-7 13a7 7 0 0014 0c0-4-3-7-7-13z"/>',
  waves: '<path d="M2 8c3-3 5-3 8 0s5 3 8 0M2 14c3-3 5-3 8 0s5 3 8 0M2 20c3-3 5-3 8 0s5 3 8 0"/>',
  kaleido: '<polygon points="12,2 22,12 12,22 2,12"/><polygon points="12,6 18,12 12,18 6,12" opacity="0.5"/>',
  fireflies: '<circle cx="6" cy="8" r="1.5" fill="currentColor" stroke="none"/><circle cx="16" cy="5" r="1" fill="currentColor" stroke="none"/><circle cx="11" cy="14" r="1.2" fill="currentColor" stroke="none"/><circle cx="18" cy="12" r="0.8" fill="currentColor" stroke="none"/><circle cx="8" cy="18" r="1" fill="currentColor" stroke="none"/><path d="M4 20v-4M10 20v-6M16 20v-3" opacity="0.3"/>',
  spiral: '<path d="M12 12c0-2 2-4 4-4s4 2 4 4-2 6-6 6-8-4-8-8 4-10 10-10" fill="none"/>',
  rain: '<line x1="6" y1="4" x2="6" y2="10"/><line x1="12" y1="2" x2="12" y2="8"/><line x1="18" y1="5" x2="18" y2="11"/><line x1="9" y1="10" x2="9" y2="16"/><line x1="15" y1="8" x2="15" y2="14"/><ellipse cx="9" cy="19" rx="3" ry="1" opacity="0.4"/>',
  ink: '<circle cx="12" cy="11" r="5" opacity="0.3"/><circle cx="12" cy="11" r="3" opacity="0.5"/><path d="M9 14c-2 3-4 2-5 4" opacity="0.3" fill="none"/><path d="M15 14c2 2 4 3 5 3" opacity="0.3" fill="none"/><circle cx="12" cy="11" r="1" opacity="0.7"/>',
  mycelium: '<circle cx="12" cy="12" r="2" fill="currentColor" stroke="none"/><circle cx="6" cy="7" r="1.5" fill="currentColor" stroke="none"/><circle cx="18" cy="8" r="1.5" fill="currentColor" stroke="none"/><circle cx="8" cy="18" r="1.5" fill="currentColor" stroke="none"/><circle cx="17" cy="17" r="1.5" fill="currentColor" stroke="none"/><line x1="12" y1="12" x2="6" y2="7" opacity="0.5"/><line x1="12" y1="12" x2="18" y2="8" opacity="0.5"/><line x1="12" y1="12" x2="8" y2="18" opacity="0.4"/><line x1="12" y1="12" x2="17" y2="17" opacity="0.4"/>',
  threads: '<circle cx="4" cy="6" r="1.2" fill="currentColor" stroke="none"/><circle cx="20" cy="6" r="1.2" fill="currentColor" stroke="none"/><circle cx="6" cy="18" r="1.2" fill="currentColor" stroke="none"/><circle cx="18" cy="18" r="1.2" fill="currentColor" stroke="none"/><circle cx="12" cy="3" r="1.2" fill="currentColor" stroke="none"/><circle cx="12" cy="21" r="1.2" fill="currentColor" stroke="none"/><path d="M4 6Q12 14 20 6M6 18Q12 10 18 18M12 3Q6 12 12 21" fill="none" opacity="0.4"/>',
};

const SCENE_LABELS = {
  deep: 'deep ocean', mandala: 'mandala', cosmos: 'cosmos', liquid: 'liquid',
  waves: 'waves', kaleido: 'kaleidoscope', fireflies: 'fireflies', spiral: 'spiral',
  rain: 'rain', ink: 'ink', mycelium: 'mycelium', threads: 'threads',
};

// Scene bar — floating carousel showing active + 2 neighbors
const sceneBar = document.getElementById('sceneBar');
let sceneBarTimeout;

function showSceneBar() {
  sceneBar.innerHTML = '';
  const total = sceneNames.length;
  const VISIBLE = 2; // neighbors on each side
  for (let offset = -VISIBLE; offset <= VISIBLE; offset++) {
    const idx = ((sceneIndex + offset) % total + total) % total;
    const name = sceneNames[idx];
    const item = document.createElement('div');
    const isActive = offset === 0;
    const isNeighbor = Math.abs(offset) === 1;
    item.className = 'scene-bar-item' + (isActive ? ' active' : '') + (isNeighbor ? ' neighbor' : '');
    item.innerHTML = `<svg viewBox="0 0 24 24">${SCENE_ICONS[name]}</svg>` +
                     `<span class="scene-bar-label">${SCENE_LABELS[name]}</span>`;
    sceneBar.appendChild(item);
  }
  sceneBar.classList.add('visible');
  clearTimeout(sceneBarTimeout);
  sceneBarTimeout = setTimeout(() => sceneBar.classList.remove('visible'), 3000);
}

// Mood bar
const moodBar = document.getElementById('moodBar');
let moodBarTimeout;

function buildMoodBar() {
  moodBar.innerHTML = '';
  moodNames.forEach((name, i) => {
    const item = document.createElement('div');
    item.className = 'mood-bar-item' + (i === moodIndex ? ' active' : '');
    item.textContent = name;
    moodBar.appendChild(item);
  });
}

function showMoodBar() {
  buildMoodBar();
  moodBar.classList.add('visible');
  clearTimeout(moodBarTimeout);
  moodBarTimeout = setTimeout(() => moodBar.classList.remove('visible'), 3000);
}

// TV Remote: long-press Enter to switch modes
const LONG_PRESS_MS = 1500;
let enterDownAt = 0;
let enterHandled = false;

const modeOrder = ['ambient', 'interactive', 'garden'];

function switchMode() {
  returnToSplash();
}

// TV Remote: D-pad controls — routes based on mode
document.addEventListener('keydown', (e) => {
  if (!started) return; // Splash handles its own key events

  // Enter: track press start for long-press detection
  if (e.keyCode === 13) {
    if (!e.repeat && enterDownAt === 0) {
      enterDownAt = performance.now();
      enterHandled = false;
    }
    // Check if held long enough
    if (enterDownAt > 0 && !enterHandled && (performance.now() - enterDownAt) >= LONG_PRESS_MS) {
      enterHandled = true;
      switchMode();
    }
    return;
  }

  if (appMode === 'interactive') {
    // Interactive mode: D-pad feeds organisms
    switch (e.keyCode) {
      case 37: symbInput.feedA = true; break;  // Left — feed organism A
      case 39: symbInput.feedB = true; break;  // Right — feed organism B
      case 38: symbInput.shiftUp = true; break;   // Up — shift colors
      case 40: symbInput.shiftDown = true; break;  // Down — shift colors
    }
  } else if (appMode === 'garden') {
    // Garden mode: D-pad moves cursor
    switch (e.keyCode) {
      case 37: gardenInput.left = true; break;
      case 39: gardenInput.right = true; break;
      case 38: gardenInput.up = true; break;
      case 40: gardenInput.down = true; break;
    }
  } else {
    // Ambient mode: D-pad cycles scenes/moods
    switch (e.keyCode) {
      case 37: setScene(sceneIndex - 1); break;
      case 39: setScene(sceneIndex + 1); break;
      case 38: setMood(moodIndex - 1); break;
      case 40: setMood(moodIndex + 1); break;
    }
  }
});

document.addEventListener('keyup', (e) => {
  if (e.keyCode === 13) {
    // Short press — do the normal action if not already handled as long-press
    if (!enterHandled && enterDownAt > 0) {
      if (appMode === 'interactive') {
        symbInput.bloom = true;
      } else if (appMode === 'garden') {
        gardenInput.plant = true;
      } else {
        toggleAutoMood();
        notifySender({ autoMood: autoMood });
        showStatus(autoMood ? 'auto mode on' : 'auto mode off');
      }
    }
    enterDownAt = 0;
    enterHandled = false;
  }
});

// Cast Receiver SDK
const castContext = cast.framework.CastReceiverContext.getInstance();

// Custom messages from sender app
const CHANNEL = 'urn:x-cast:tripsitter';
let receivedFirstMessage = false;
castContext.addCustomMessageListener(CHANNEL, (event) => {
  // Skip the initial sync message from sender connecting
  if (!receivedFirstMessage) {
    receivedFirstMessage = true;
    return;
  }
  dismissSplash();
  const data = event.data;
  if (data.scene) {
    const idx = sceneNames.indexOf(data.scene);
    if (idx !== -1) setScene(idx, true);
  }
  if (data.mood) {
    const idx = moodNames.indexOf(data.mood);
    if (idx !== -1) setMood(idx, true);
  }
  if (data.autoMood !== undefined) {
    autoMood = data.autoMood;
    showStatus(autoMood ? 'auto mood on' : 'auto mood off');
  }
  if (data.mode) {
    switchToMode(data.mode);
    showStatus(data.mode === 'interactive' ? 'symbiosis' : data.mode);
  }
});

// Start the receiver with no default UI and no audio focus
const options = new cast.framework.CastReceiverOptions();
options.disableIdleTimeout = true;
options.skipPlayersLoad = true;
options.skipMplLoad = true;
options.mediaElement = null;
castContext.start(options);
</script>
</body>
</html>
