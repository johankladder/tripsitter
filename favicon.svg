<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#050510"/>
    </radialGradient>
    <radialGradient id="glow1" cx="40%" cy="35%" r="45%">
      <stop offset="0%" stop-color="#7b4fff" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#3a1f8e" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1a0a2e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="65%" cy="60%" r="40%">
      <stop offset="0%" stop-color="#00e5a0" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#0088cc" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#050510" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="25%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="30%" stop-color="#c4b5fd" stop-opacity="0.7"/>
      <stop offset="70%" stop-color="#7b4fff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#7b4fff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Deep cosmic background -->
  <circle cx="16" cy="16" r="16" fill="url(#bg)"/>

  <!-- Orbital ring 1 — tilted ellipse -->
  <ellipse cx="16" cy="16" rx="12" ry="5" transform="rotate(-25 16 16)"
    fill="none" stroke="#7b4fff" stroke-width="0.6" stroke-opacity="0.35"/>

  <!-- Orbital ring 2 — counter-tilted -->
  <ellipse cx="16" cy="16" rx="11" ry="4.5" transform="rotate(40 16 16)"
    fill="none" stroke="#00e5a0" stroke-width="0.5" stroke-opacity="0.3"/>

  <!-- Aurora nebula blobs -->
  <circle cx="12" cy="11" r="8" fill="url(#glow1)"/>
  <circle cx="20" cy="20" r="7" fill="url(#glow2)"/>

  <!-- Central luminous core -->
  <circle cx="16" cy="16" r="8" fill="url(#core)"/>
  <circle cx="16" cy="16" r="2.5" fill="#ffffff" fill-opacity="0.9"/>
  <circle cx="16" cy="16" r="1.2" fill="#ffffff"/>

  <!-- Tiny star accents -->
  <circle cx="6" cy="7" r="0.6" fill="#c4b5fd" fill-opacity="0.7"/>
  <circle cx="25" cy="5" r="0.5" fill="#00e5a0" fill-opacity="0.6"/>
  <circle cx="27" cy="14" r="0.4" fill="#ffffff" fill-opacity="0.5"/>
  <circle cx="4" cy="22" r="0.5" fill="#7b4fff" fill-opacity="0.5"/>
  <circle cx="9" cy="27" r="0.4" fill="#00e5a0" fill-opacity="0.4"/>
</svg>
