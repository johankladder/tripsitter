<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tripsitter</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="main"></canvas>
<div class="grain"></div>
<div class="vignette"></div>
<div class="cursor-glow" id="cursorGlow"></div>

<div class="controls">
  <!-- Top toolbar -->
  <div class="toolbar">
    <button class="toolbar-btn" id="fullscreenBtn" title="Fullscreen">
      <svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/></svg>
    </button>
    <button class="toolbar-btn" id="castBtn" title="Cast to TV" style="display:none;">
      <svg viewBox="0 0 24 24"><path d="M1 18v3h3c0-1.66-1.34-3-3-3zm0-4v2c2.76 0 5 2.24 5 5h2c0-3.87-3.13-7-7-7zm0-4v2c4.97 0 9 4.03 9 9h2c0-6.08-4.93-11-11-11zm20-7H3c-1.1 0-2 .9-2 2v3h2V5h18v14h-7v2h7c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg>
    </button>
    <button class="toolbar-btn auto-mood-btn" id="autoMoodBtn" title="Auto mode" data-label="auto mode" onclick="toggleAutoMood()">
      <svg viewBox="0 0 24 24"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
    </button>
  </div>

  <!-- Bottom panel -->
  <div class="panel">
    <div class="panel-section">
      <div class="control-label">scene</div>
      <div class="btn-grid scenes-grid">
        <button class="scene-btn active" data-scene="deep" data-label="deep ocean">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="4" opacity="0.5"/></svg>
          <span>deep ocean</span>
        </button>
        <button class="scene-btn" data-scene="mandala" data-label="mandala">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><line x1="12" y1="3" x2="12" y2="21"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="5.6" y1="5.6" x2="18.4" y2="18.4"/><line x1="18.4" y1="5.6" x2="5.6" y2="18.4"/></svg>
          <span>mandala</span>
        </button>
        <button class="scene-btn" data-scene="cosmos" data-label="cosmos">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="6" r="1.5" fill="currentColor" stroke="none"/><circle cx="6" cy="16" r="1" fill="currentColor" stroke="none"/><circle cx="18" cy="14" r="1.2" fill="currentColor" stroke="none"/><circle cx="14" cy="20" r="0.8" fill="currentColor" stroke="none"/><circle cx="8" cy="10" r="0.6" fill="currentColor" stroke="none"/><path d="M4 3l2 2M18 5l1.5 1.5" opacity="0.5"/></svg>
          <span>cosmos</span>
        </button>
        <button class="scene-btn" data-scene="liquid" data-label="liquid">
          <svg viewBox="0 0 24 24"><path d="M12 3c-4 6-7 9-7 13a7 7 0 0014 0c0-4-3-7-7-13z"/></svg>
          <span>liquid</span>
        </button>
        <button class="scene-btn" data-scene="waves" data-label="waves">
          <svg viewBox="0 0 24 24"><path d="M2 8c3-3 5-3 8 0s5 3 8 0M2 14c3-3 5-3 8 0s5 3 8 0M2 20c3-3 5-3 8 0s5 3 8 0"/></svg>
          <span>waves</span>
        </button>
        <button class="scene-btn" data-scene="kaleido" data-label="kaleidoscope">
          <svg viewBox="0 0 24 24"><polygon points="12,2 22,12 12,22 2,12"/><polygon points="12,6 18,12 12,18 6,12" opacity="0.5"/></svg>
          <span>kaleidoscope</span>
        </button>
        <button class="scene-btn" data-scene="fireflies" data-label="fireflies">
          <svg viewBox="0 0 24 24"><circle cx="6" cy="8" r="1.5" fill="currentColor" stroke="none"/><circle cx="16" cy="5" r="1" fill="currentColor" stroke="none"/><circle cx="11" cy="14" r="1.2" fill="currentColor" stroke="none"/><circle cx="18" cy="12" r="0.8" fill="currentColor" stroke="none"/><circle cx="8" cy="18" r="1" fill="currentColor" stroke="none"/><path d="M4 20v-4M10 20v-6M16 20v-3" opacity="0.3"/></svg>
          <span>fireflies</span>
        </button>
        <button class="scene-btn" data-scene="spiral" data-label="spiral">
          <svg viewBox="0 0 24 24"><path d="M12 12c0-2 2-4 4-4s4 2 4 4-2 6-6 6-8-4-8-8 4-10 10-10" fill="none"/></svg>
          <span>spiral</span>
        </button>
        <button class="scene-btn" data-scene="rain" data-label="rain">
          <svg viewBox="0 0 24 24"><line x1="6" y1="4" x2="6" y2="10"/><line x1="12" y1="2" x2="12" y2="8"/><line x1="18" y1="5" x2="18" y2="11"/><line x1="9" y1="10" x2="9" y2="16"/><line x1="15" y1="8" x2="15" y2="14"/><ellipse cx="9" cy="19" rx="3" ry="1" opacity="0.4"/></svg>
          <span>rain</span>
        </button>
        <button class="scene-btn" data-scene="ink" data-label="ink">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="11" r="5" opacity="0.3"/><circle cx="12" cy="11" r="3" opacity="0.5"/><path d="M9 14c-2 3-4 2-5 4" opacity="0.3" fill="none"/><path d="M15 14c2 2 4 3 5 3" opacity="0.3" fill="none"/><circle cx="12" cy="11" r="1" opacity="0.7"/></svg>
          <span>ink</span>
        </button>
        <button class="scene-btn" data-scene="mycelium" data-label="mycelium">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="2" fill="currentColor" stroke="none"/><circle cx="6" cy="7" r="1.5" fill="currentColor" stroke="none"/><circle cx="18" cy="8" r="1.5" fill="currentColor" stroke="none"/><circle cx="8" cy="18" r="1.5" fill="currentColor" stroke="none"/><circle cx="17" cy="17" r="1.5" fill="currentColor" stroke="none"/><line x1="12" y1="12" x2="6" y2="7" opacity="0.5"/><line x1="12" y1="12" x2="18" y2="8" opacity="0.5"/><line x1="12" y1="12" x2="8" y2="18" opacity="0.4"/><line x1="12" y1="12" x2="17" y2="17" opacity="0.4"/></svg>
          <span>mycelium</span>
        </button>
        <button class="scene-btn" data-scene="threads" data-label="threads">
          <svg viewBox="0 0 24 24"><circle cx="4" cy="6" r="1.2" fill="currentColor" stroke="none"/><circle cx="20" cy="6" r="1.2" fill="currentColor" stroke="none"/><circle cx="6" cy="18" r="1.2" fill="currentColor" stroke="none"/><circle cx="18" cy="18" r="1.2" fill="currentColor" stroke="none"/><circle cx="12" cy="3" r="1.2" fill="currentColor" stroke="none"/><circle cx="12" cy="21" r="1.2" fill="currentColor" stroke="none"/><path d="M4 6Q12 14 20 6M6 18Q12 10 18 18M12 3Q6 12 12 21" fill="none" opacity="0.4"/></svg>
          <span>threads</span>
        </button>
      </div>
    </div>

    <div class="panel-section">
      <div class="control-label">mood</div>
      <div class="btn-grid moods-grid">
        <button class="mood-btn active" data-mood="ocean" data-label="ocean"><span>ocean</span></button>
        <button class="mood-btn" data-mood="aurora" data-label="aurora"><span>aurora</span></button>
        <button class="mood-btn" data-mood="ember" data-label="ember"><span>ember</span></button>
        <button class="mood-btn" data-mood="dream" data-label="dream"><span>dream</span></button>
        <button class="mood-btn" data-mood="forest" data-label="forest"><span>forest</span></button>
        <button class="mood-btn" data-mood="sunset" data-label="sunset"><span>sunset</span></button>
        <button class="mood-btn" data-mood="ice" data-label="ice"><span>ice</span></button>
        <button class="mood-btn" data-mood="neon" data-label="neon"><span>neon</span></button>
        <button class="mood-btn" data-mood="midnight" data-label="midnight"><span>midnight</span></button>
        <button class="mood-btn" data-mood="rose" data-label="rose"><span>rose</span></button>
      </div>
    </div>
  </div>
</div>


<script src="app.js"></script>
<script src="scenes/deep.js"></script>
<script src="scenes/mandala.js"></script>
<script src="scenes/cosmos.js"></script>
<script src="scenes/liquid.js"></script>
<script src="scenes/waves.js"></script>
<script src="scenes/kaleido.js"></script>
<script src="scenes/fireflies.js"></script>
<script src="scenes/spiral.js"></script>
<script src="scenes/rain.js"></script>
<script src="scenes/ink.js"></script>
<script src="scenes/mycelium.js"></script>
<script src="scenes/threads.js"></script>
<script src="modes/constellation.js"></script>
<script src="modes/symbiosis.js"></script>
<script src="modes/garden.js"></script>
<script src="boot.js"></script>
<script src="cast-sender.js"></script>
<script async src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
</body>
</html>
